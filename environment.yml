# Entorno reproducible de Fase 0, congelado el 2026-05-21 desde Linux/Brais.
#
# Recrear desde cero:
#   conda env create -f environment.yml
#   conda activate sc2-rl-infra
#   pip install -e . --no-deps          # instala el paquete sc2_rl_infra (no está en PyPI)
#
# Notas:
#   - Se omite a propósito 'sc2-rl-infra==0.0.1' del freeze original: es este mismo
#     paquete, se instala con 'pip install -e .'.
#   - SC2 (el binario 4.10.0) NO va aquí: se instala por sideload, ver NOTES.md §6.
name: sc2-rl-infra
channels:
  - defaults
dependencies:
  - _libgcc_mutex=0.1
  - _openmp_mutex=5.1
  - bzip2=1.0.8
  - ca-certificates=2026.3.19
  - ld_impl_linux-64=2.44
  - libexpat=2.8.0
  - libffi=3.4.8
  - libgcc=15.2.0
  - libgcc-ng=15.2.0
  - libgomp=15.2.0
  - libnsl=2.0.0
  - libstdcxx=15.2.0
  - libuuid=1.41.5
  - libxcb=1.17.0
  - libzlib=1.3.1
  - ncurses=6.5
  - openssl=3.5.6
  - packaging=26.0
  - pip=26.0.1
  - pthread-stubs=0.3
  - python=3.10.20
  - readline=8.3
  - setuptools=82.0.1
  - sqlite=3.51.2
  - tk=8.6.15
  - tzdata=2026a
  - wheel=0.46.3
  - xorg-libx11=1.8.12
  - xorg-libxau=1.0.12
  - xorg-libxdmcp=1.1.5
  - xorg-xorgproto=2024.1
  - xz=5.8.2
  - zlib=1.3.1
  - pip:
      - absl-py==2.4.0
      - attrs==26.1.0
      - certifi==2026.4.22
      - charset-normalizer==3.4.7
